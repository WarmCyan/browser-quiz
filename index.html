<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script type="text/javascript">

        // ----------------------
        const version = "v0.1.0";
        // ----------------------

        let lists = {};
        let name_elements = [];
        let txtarea_elements = [];


        let quizList = [];
        let quizIndex = 0;
        let timer = 0;
        let previousTimestamp = undefined;
        let lastTimerString = "";
        let currentTimerState = "none";


        let resetTime = 4.0;
        let executeTime = 4.0;
        
        let affirmationsList = [
            "Good job!",
            "Boom!",
            "Hyah!",
            "Nice!",
            "Slick moves!",
            "That bad guy is super dead now for sure!",
            "Don't worry, you'll definitely get the next one!",
            "Chuck Norris doesn't need affirmations, affirmations need Chuck Norris."
        ];


        function addNewList() {
            console.log("NEW!");
            let name = document.createElement("input");
            let txt = document.createElement("textarea");
            name.setAttribute("placeholder", "name");
            txt.setAttribute("rows", 20);
            txt.setAttribute("placeholder", "Enter a quiz item per line");

            name_elements.push(name);
            txtarea_elements.push(txt);

            let container = document.getElementById("lists");
            container.appendChild(name);
            container.appendChild(txt);
        }

        function createListsEditorElements() {
            name_elements = []
            txtarea_elements = []

            let container = document.getElementById("lists");
            container.innerHTML = "";
            
            for (let index in Object.keys(lists)) {
                let key = Object.keys(lists)[index];
                console.log(key);
                console.log(lists[key]);
                addNewList();
                let name = name_elements[name_elements.length - 1];
                let txt = txtarea_elements[txtarea_elements.length - 1];
                name.value = key;
                txt.value = lists[key].join("\n");
            }
        }

        function captureListState() {
            console.log("Capturing");
            lists = {}
            for (let i = 0; i < txtarea_elements.length; i++) {
                let name = name_elements[i];
                let txt = txtarea_elements[i];

                lists[name.value] = txt.value.split("\n");
            }
            console.log(lists);
        }

        function download() {
            let link = document.getElementById("downloadAnchorElem");
            let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(lists));
            link.setAttribute("href", dataStr);
            link.setAttribute("download", "list.json");
            link.click();
        }


        async function loadListsFromFile() {
            let listpicker = document.getElementById("listpicker");
            let file = listpicker.files[0];
            console.log(file);

            /*let reader = new FileReader();
            let contents = reader.readAsText(file);*/
            let contents = await file.text();
            console.log(contents);
            lists = JSON.parse(contents);
            console.log(lists);
            createListsEditorElements();
        }

        function endQuiz() {
            let nameelem = document.getElementById("name");
            nameelem.innerHTML = "Whew! All done!";
        }


        function runQuiz() {
            console.log("Quiz time!");
            let items = [];
            for (let key in lists) {
                console.log(lists[key]);
                items = items.concat(lists[key]);
            }
            console.log(items);
            quizList = items;
            quizIndex = -1;

            changeTab("activeQuizPage");
            quizBeginningTime();
        }

        function quizBeginningTime() {
            let nameelem = document.getElementById("name");
            nameelem.innerHTML = "Prepare yourself!"; 
            currentTimerState = "beginning";
            countdownTimer(1.0);
        }

        function getRandomInt(max) {
            return Math.floor(Math.random() * max);
        }

        function quizInBetweenReadinessTime() {
            let nameelem = document.getElementById("name");
            let affirmation = affirmationsList[getRandomInt(affirmationsList.length)];
            nameelem.innerHTML = affirmation + " Get ready for the next one..."; 
            currentTimerState = "reset";
            countdownTimer(resetTime);
        }

        function advanceQuiz() {
            quizIndex += 1;
            let nameelem = document.getElementById("name");
            
            item = quizList[quizIndex];
            nameelem.innerHTML = item;
            currentTimerState = "execute";
            countdownTimer(executeTime);
        }

        // https://developer.mozilla.org/en-US/docs/Web/API/Window/requestAnimationFrame
        function step(timestamp) {
            if (previousTimestamp === undefined) {
                previousTimestamp = timestamp;
            }

            let elapsed = timestamp - previousTimestamp;


            let remaining = timer - elapsed / 1000.0;
            
            timerelem = document.getElementById("timer");
            newTimerString = remaining.toFixed(1);
            if (newTimerString != lastTimerString) {
                timerelem.innerHTML = newTimerString;
                lastTimerString = newTimerString;
            }

            if (remaining > 0.0) {
                requestAnimationFrame(step);
            }
            else {

                // check for the end of the quiz
                if (quizIndex + 1 == quizList.length) {
                    let nameelem = document.getElementById("name");
                    nameelem.innerHTML = "done!";
                    timerelem.innerHTML = "";
                    lastTimerString = "";
                    endQuiz();
                    return;
                }

                console.log("Done!");
                if (currentTimerState === "beginning" || currentTimerState === "reset") {
                    advanceQuiz();
                }
                else {
                    quizInBetweenReadinessTime();
                }
            }
        }

        function countdownTimer(seconds) {
            previousTimestamp = undefined;
            timer = seconds;
            
            requestAnimationFrame(step);
        }


        // initial page setup stuff
        function onPageReady() {
            console.log("??");
            let savelistbtn = document.getElementById("savemylist");

            
            
            savelistbtn.addEventListener("click", () => {
                captureListState();
                /*list_elem = document.getElementById("mylist");
                console.log(list_elem);
                console.log(list_elem.value);


                let link = document.getElementById("downloadAnchorElem");
                let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(list_elem.value));
                link.setAttribute("href", dataStr);
                link.setAttribute("download", "list.json");
                link.click();*/
            });

            

            
            console.log("Ready!");
        }

        window.addEventListener("DOMContentLoaded", (event) => { onPageReady(); });


        function changeTab(tabid) {
            let tablist = document.getElementsByClassName("tab");
            for (i = 0; i < tablist.length; i++) {
                tablist[i].style.display = "none";
            }
            document.getElementById(tabid).style.display = "block";
        }

        
        </script>
        <style>
        </style>
    </head>
    <body>


        <div id="tablist">

            <button onclick="changeTab('mainPage')">Main</button>
            <button onclick="changeTab('editListsPage')">Edit Lists</button>
            <button onclick="changeTab('aboutPage')">About</button>
            <input type="file", id="listpicker" accept=".json" onchange="loadListsFromFile()" />
            <button id="downloadbtn" onclick="download()">Download</button>
            <!-- https://stackoverflow.com/questions/19721439/download-json-object-as-a-file-from-browser -->
            <a id="downloadAnchorElem" style="display: none"></a>
        </div>


        <div id="activeQuizPage" class="tab" style="display: none">
            <h1 id="name"></h1>
            <h2 id="timer"></h2>
        </div>

        <div id="mainPage" class="tab">
            <button id="runquiz" onclick="runQuiz()">Run</button>
        </div>


        <div id="editListsPage" class="tab" style="display: none">
            <button id="newlist" onclick="addNewList()">New</button>
            <div id="lists">
                <!-- <textarea id="mylist", rows="20"></textarea> -->
            </div>
            <button id="savemylist">Save</button>
        </div>
        
        <div id="aboutPage" class="tab" style="display: none">
            hi!
        </div>
        
    </body>
</html>
