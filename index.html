        // https://stackoverflow.com/questions/2450954/how-to-randomize-shuffle-a-javascript-array
        function shuffle(array) {
            // iterate end to beginning
            let currentIndex = array.length;
            while (currentIndex != 0) {
                // Pick a remaining element
                let randomIndex = getRandomInt(currentIndex);
                currentIndex--;

                // And swap it with the current element
                [array[currentIndex], array[randomIndex]] = [
                    array[randomIndex], array[currentIndex]];
            }
        }

        function addNewList() {
            console.log("NEW!");
            let thislistcontainer = document.createElement("div"); 
            thislistcontainer.className = "list";
            
            let name = document.createElement("input");
            let txt = document.createElement("textarea");
            name.setAttribute("placeholder", "name");
            txt.setAttribute("rows", 20);
            txt.setAttribute("placeholder", "Enter a quiz item per line");


            name.addEventListener("input", () => {
                captureListState();
            })
            txt.addEventListener("blur", () => {

            name_elements.push(name);
            txtarea_elements.push(txt);

            let rmbtn = document.createElement("button");

            thislistcontainer.appendChild(name);
            thislistcontainer.appendChild(txt);
            //thislistcontainer.appendChild(rmbtn);
            container.appendChild(thislistcontainer);
            updateCheckLists();
        }

        function createListsEditorElements() {
            name_elements = []

            for (let index in Object.keys(lists)) {
                let key = Object.keys(lists)[index];

                console.log(lists[key]);
                addNewList();

                let txt = txtarea_elements[txtarea_elements.length - 1];

                txt.value = lists[key].join("\n");
            }
        }


        function updateCheckLists() {

                let checkboxDisplay = document.createElement("span");

                checkboxDisplay.classList.add("row-item");

                checkContainer.appendChild(checkboxDisplay);

        function captureListState() {
            console.log("Capturing");
            lists = {}
            for (let i = 0; i < txtarea_elements.length; i++) {
                let name = name_elements[i];
                let txt = txtarea_elements[i];

                lists[name.value] = txt.value.split("\n");
            }
            console.log(lists);

        }

        function download() {

            let file = filepicker.files[0];

            console.log(contents);

        function endQuiz() {
            let nameelem = document.getElementById("name");
            nameelem.innerHTML = "Whew! All done!";
            setQuizBackgroundColor("#112233");
        }


        function runQuiz() {
            console.log("Quiz time!");


            // get the set of checked lists
            let selectedLists = [];
            let checkboxes = document.getElementsByName("checkedlists");
            for (let i = 0; i < checkboxes.length; i++) {
                if (checkboxes[i].checked) {
                    selectedLists.push(checkboxes[i].value);
                }
            }
            console.log("Found these lists selected: ");
            console.log(selectedLists);
            
            let items = [];
            for (let i = 0; i < selectedLists.length; i++) {
                let key = selectedLists[i];
                items = items.concat(lists[key]);
            }
            if (randomize) {
                shuffle(items);
            }
            console.log(items);

            
            quizList = items;
            quizIndex = -1;

            changeTab("activeQuizPage");
            quizBeginningTime();
        }

        function quizBeginningTime() {
            let nameelem = document.getElementById("name");
            nameelem.innerHTML = "Prepare yourself!"; 
            currentTimerState = "beginning";
            setQuizBackgroundColor("#112233");
            countdownTimer(1.0);
        }

        function getRandomInt(max) {
            return Math.floor(Math.random() * max);
        }

        function quizInBetweenReadinessTime() {
            let nameelem = document.getElementById("name");
            let flavortextelem = document.getElementById("flavortext");
            let affirmation = affirmationsList[getRandomInt(affirmationsList.length)];
            nameelem.innerHTML = "";
            flavortextelem.innerHTML = affirmation + " Get ready..."; 
            currentTimerState = "reset";
            setQuizBackgroundColor("#112233");
            countdownTimer(resetTime);
        }

        function setQuizBackgroundColor(color) {
            let elem = document.getElementById("activeQuizPage");
            elem.style["background-color"] = color;
        }

        function advanceQuiz() {
            quizIndex += 1;
            let nameelem = document.getElementById("name");
            let flavortextelem = document.getElementById("flavortext");
            
            item = quizList[quizIndex];
            nameelem.innerHTML = item;
            flavortextelem.innerHTML = "";
            currentTimerState = "execute";
            setQuizBackgroundColor("#332211");

            
            if (item[item.length-1] === "*") {
            document.getElementById("timer").style.display = "none";
                document.getElementById("nextbtn").style.display = "inline-block";
            }
            else {
                countdownTimer(executionTime);
            }
        }

        function nextBtnClicked() {
            document.getElementById("nextbtn").style.display = "none";
            document.getElementById("timer").style.display = "block";
            if (checkQuizCompletion()) { return; }
            quizInBetweenReadinessTime();
        }

        function checkQuizCompletion() {
            if (quizIndex + 1 == quizList.length) {
                let nameelem = document.getElementById("name");
                nameelem.innerHTML = "done!";
                timerelem.innerHTML = "";
                document.getElementById("nextbtn").style.display = "none";
                lastTimerString = "";
                endQuiz();
                return true;
            }
            return false;
        }

        // https://developer.mozilla.org/en-US/docs/Web/API/Window/requestAnimationFrame
        function step(timestamp) {
            if (previousTimestamp === undefined) {
                previousTimestamp = timestamp;
            }

            let elapsed = timestamp - previousTimestamp;


            let remaining = timer - elapsed / 1000.0;
            
            timerelem = document.getElementById("timer");
            newTimerString = remaining.toFixed(1);
            if (newTimerString != lastTimerString) {
                timerelem.innerHTML = newTimerString;
                lastTimerString = newTimerString;
            }

            if (remaining > 0.0) {
                requestAnimationFrame(step);
            }
            else {
                if (checkQuizCompletion()) { return; }

                console.log("Done!");
                if (currentTimerState === "beginning" || currentTimerState === "reset") {
                    advanceQuiz();
                }
                else {
                    quizInBetweenReadinessTime();
                }
            }
        }

        function countdownTimer(seconds) {
            previousTimestamp = undefined;
            timer = seconds;
            
            requestAnimationFrame(step);
        }

        function changeTab(tabid) {
            let tablist = document.getElementsByClassName("tab");
            let tablistbtns = document.getElementsByClassName("tabbtn");
            let targetId = 0;
            for (i = 0; i < tablist.length; i++) {
                tablist[i].style.display = "none";
                if (i < tablistbtns.length) {
                    tablistbtns[i].className = tablistbtns[i].className.replace(" active-tab", "");
                    if (tablist[i].id == tabid) {
                        targetId = i;
                    }
                }
            }
            document.getElementById(tabid).style.display = "block";
            tablistbtns[targetId].className += " active-tab";
        }

        function grabTimes() {
            executionTime = parseFloat(document.getElementById("executionTime").value);

            document.getElementById("resetTimeLabel").innerHTML = "(" + resetTime.toFixed(1) + ")";
            document.getElementById("executionTimeLabel").innerHTML = "(" + executionTime.toFixed(1) + ")";
        }
